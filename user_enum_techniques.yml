---
# WPX User Enumeration Techniques
# Each technique defines an endpoint and detection metadata.
# The Python implementation in wpx_finder.py handles the actual logic per type.

techniques:

  rest_api:
    name: REST API User Enumeration
    description: Direct access to WP REST API users endpoint — richest data source
    endpoint: /wp-json/wp/v2/users
    type: rest_api
    risk: high
    confidence: 95

  author_archive:
    name: Author Archive (?author=N)
    description: Probe author IDs via ?author=N and extract slug from redirect destination
    endpoint: /?author={id}
    type: author_archive
    risk: high
    confidence: 85

  oembed:
    name: oEmbed Author Leak
    description: Extract author_name from oEmbed response using a known post URL
    endpoint: /wp-json/oembed/1.0/embed
    type: oembed
    risk: medium
    confidence: 70

  rss_feed:
    name: RSS Feed Author Leak
    description: Parse dc:creator and author tags from the RSS feed
    endpoint: /feed/
    type: rss_feed
    risk: low
    confidence: 75
